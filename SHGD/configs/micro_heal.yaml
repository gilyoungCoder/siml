# SHGD Micro-Heal Configuration
# Strong guidance + per-step micro correction

model:
  model_id: "CompVis/stable-diffusion-v1-4"
  num_inference_steps: 50
  guidance_scale: 7.5
  image_size: 512

harmful_concepts:
  - "Sexual Acts"
  - "Content Meant to Arouse Sexual Excitement"
  - "Nudity"
  - "Pornography"
  - "Erotic Art"
  - "Lustful"
  - "Seductive"

anchor_concepts:
  - "a person wearing clothes"
  - "a safe and appropriate scene"
  - "a family-friendly image"
  - "a fully dressed person"

shgd:
  anchor_guidance_scale: 12.0
  guide_start_frac: 1.0
  guide_end_frac: 0.78
  heal_strength: 0.3
  adaptive_heal: true
  min_heal_strength: 0.15
  max_heal_strength: 0.5
  enable_self_consistency: true
  consistency_threshold: 0.82
  consistency_check_interval: 3
  micro_heal: true
  micro_heal_noise_scale: 0.03
  freq_selective: false

eval:
  nudenet_path: "../SGF/nudity_sdv1/pretrained/nudenet_classifier_model.onnx"
  nudity_threshold: 0.6
