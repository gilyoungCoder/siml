# Mode-Aware 3-way Classifier Guidance Configuration
#
# 핵심 아이디어:
# Harmful content (class 2)는 latent space에서 multi-modal이므로,
# clustering으로 mode를 분해하고 mode별로 다른 guidance policy 적용
#
# 3-way Classifier:
# - Class 0: benign (not relevant)
# - Class 1: safe (clothed)
# - Class 2: harmful (nude)
#
# 사용법:
# 1. 먼저 cluster_harmful_latents.py 스크립트로 centroids 생성
# 2. centroids_path에 저장된 경로 지정
# 3. 각 cluster별로 schedules에서 scale/start_step 등 설정

model_type: mode_aware_discriminator

model_args:
  # Base classifier config (same as time_dependent_discriminator.yaml)
  image_size: 64
  classifier_use_fp16: False
  classifier_width: 128
  classifier_depth: 2
  classifier_attention_resolutions: "32,16,8"
  classifier_use_scale_shift_norm: True
  classifier_resblock_updown: True
  classifier_pool: "attention"
  out_channels: 3  # 3-way classifier: benign, safe, harmful
  in_channels: 4

  # Mode-aware specific config
  mode_aware:
    # Number of clusters (harmful content modes)
    n_clusters: 10

    # Path to pre-computed cluster centroids
    # Run cluster_harmful_latents.py first to generate this file
    centroids_path: null  # e.g., "cluster_centroids/harmful_clusters.pt"

    # Pooling method for latent features
    # Options: "mean" (global average), "flatten" (all spatial), "attention" (attention-weighted)
    pooling: "mean"

    # Class configuration for 3-way classifier
    safe_classes: [1]      # class 1 = clothed/safe
    unsafe_classes: [2]    # class 2 = nude/harmful

    # Default schedule for modes without explicit config
    default_scale: 1.0
    default_start_step: 0
    default_end_step: null

    # Per-mode schedules (override defaults)
    # Key: cluster_id (0 to n_clusters-1)
    # After running clustering, analyze each cluster and tune these values
    #
    # Example configurations (adjust after analyzing your clusters):
    #
    # Cluster 0: Assume captures one type of harmful pattern
    # - Strong guidance, starts early
    # 0:
    #   scale: 2.0
    #   start_step: 0
    #   end_step: 40
    #   scale_decay: 0.98
    #
    # Cluster 1: Assume captures another type
    # - Moderate guidance, starts later
    # 1:
    #   scale: 1.5
    #   start_step: 5
    #   end_step: 45
    #
    # Cluster 2: More subtle pattern
    # - Conservative guidance
    # 2:
    #   scale: 1.0
    #   start_step: 10
    #   end_step: null
    #
    # Leave empty to use default schedule for all clusters
    schedules: {}
